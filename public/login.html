<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finewise AI - Sign In / Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 120px);
      padding: 2rem 0;
    }
    
    .auth-card {
      width: 100%;
      max-width: 440px;
    }
    
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 2rem;
    }
    
    .auth-tab {
      flex: 1;
      padding: 1rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
      border-bottom: 2px solid transparent;
    }
    
    .auth-tab.active {
      color: var(--accent-purple);
      border-bottom-color: var(--accent-purple);
    }

    /* Toggle Switch Component */
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
      flex-shrink: 0;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255, 255, 255, 0.05);
      transition: .3s ease;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: var(--text-secondary);
      transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: rgba(239, 68, 68, 0.15);
      border-color: #ef4444;
    }
    
    input:checked + .slider:before {
      transform: translateX(24px);
      background-color: #ef4444;
    }

    /* Admin mode UI customization */
    .auth-card.admin-active {
      border-color: rgba(239, 68, 68, 0.3) !important;
      box-shadow: 0 8px 32px 0 rgba(239, 68, 68, 0.1) !important;
    }

    .auth-card.admin-active .auth-tab.active {
      color: #ef4444 !important;
      border-bottom-color: #ef4444 !important;
    }

    .admin-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 4px;
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
      margin-left: 0.5rem;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.8; }
      50% { opacity: 1; }
      100% { opacity: 0.8; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="/" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="logoGrad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8B5CF6"/>
            <stop offset="1" stop-color="#EC4899"/>
          </linearGradient>
        </defs>
      </svg>
      Finewise AI
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-wrapper">
      <div class="glass-card auth-card" id="auth-card-el">
        
        <!-- Auth Tabs (Login / Signup) -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <div id="alert-container"></div>

        <!-- Dynamic Portal Title -->
        <div style="text-align: center; margin-bottom: 1.25rem;">
          <h2 id="auth-heading" style="font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #ffffff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: var(--transition);">Client Portal Login</h2>
        </div>

        <!-- Role Toggle Switch -->
        <div class="toggle-container" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; background: rgba(255, 255, 255, 0.02); padding: 0.75rem 1rem; border: 1px solid var(--glass-border); border-radius: 8px;">
          <div style="display: flex; flex-direction: column;">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <span id="toggle-label-text" style="font-size: 0.875rem; font-weight: 600; color: var(--text-primary); transition: var(--transition);">Client Mode</span>
              <span id="admin-badge-el" style="display: none;" class="admin-badge">Admin Mode Active</span>
            </div>
            <span id="toggle-subtext" style="font-size: 0.75rem; color: var(--text-secondary); transition: var(--transition);">Access standard client dashboard services</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="role-toggle" onchange="handleRoleToggle(this)">
            <span class="slider"></span>
          </label>
        </div>

        <!-- Authentication Form -->
        <form id="auth-form" onsubmit="handleAuthSubmit(event)">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; transition: var(--transition);" id="submit-btn">
            Sign In to Dashboard
          </button>
        </form>

      </div>
    </div>
  </div>

  <script>
    let activeTab = 'login';
    let activeRole = 'client';

    // Check query params for default role
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const roleParam = params.get('role');
      
      const toggle = document.getElementById('role-toggle');
      if (roleParam === 'admin') {
        toggle.checked = true;
        updateRoleState(true);
      } else {
        toggle.checked = false;
        updateRoleState(false);
      }
      
      // If user is already logged in, redirect them
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('role');
      if (token && role) {
        window.location.href = role === 'admin' ? '/admin.html' : '/client.html';
      }
    });

    function updateRoleState(isAdmin) {
      activeRole = isAdmin ? 'admin' : 'client';
      
      const card = document.getElementById('auth-card-el');
      const heading = document.getElementById('auth-heading');
      const labelText = document.getElementById('toggle-label-text');
      const subtext = document.getElementById('toggle-subtext');
      const badge = document.getElementById('admin-badge-el');
      const submitBtn = document.getElementById('submit-btn');

      if (isAdmin) {
        card.classList.add('admin-active');
        heading.style.background = 'linear-gradient(135deg, #ffffff, #f87171)';
        heading.textContent = activeTab === 'login' ? 'Administrator Login' : 'Administrator Registration';
        labelText.textContent = 'Administrator Mode';
        labelText.style.color = '#f87171';
        subtext.textContent = 'Enforce restricted system admin portal controls';
        badge.style.display = 'inline-block';
        submitBtn.textContent = activeTab === 'login' ? 'Login as Administrator' : 'Register Administrator';
        submitBtn.style.background = 'linear-gradient(135deg, #ef4444, #f87171)';
      } else {
        card.classList.remove('admin-active');
        heading.style.background = 'linear-gradient(135deg, #ffffff, #a78bfa)';
        heading.textContent = activeTab === 'login' ? 'Client Portal Login' : 'Client Registration';
        labelText.textContent = 'Client Mode';
        labelText.style.color = 'var(--text-primary)';
        subtext.textContent = 'Access standard client dashboard services';
        badge.style.display = 'none';
        submitBtn.textContent = activeTab === 'login' ? 'Login as Client' : 'Register as Client';
        submitBtn.style.background = 'linear-gradient(135deg, var(--accent-purple), var(--accent-pink))';
      }
      
      heading.style.webkitBackgroundClip = 'text';
      heading.style.webkitTextFillColor = 'transparent';
    }

    function handleRoleToggle(checkbox) {
      updateRoleState(checkbox.checked);
      // Clear alert
      document.getElementById('alert-container').innerHTML = '';
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      
      const toggle = document.getElementById('role-toggle');
      updateRoleState(toggle.checked);
      
      // Clear alert
      document.getElementById('alert-container').innerHTML = '';
    }

    async function handleAuthSubmit(event) {
      event.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const alertContainer = document.getElementById('alert-container');
      
      const payload = {
        username: usernameInput.value,
        password: passwordInput.value,
        role: activeRole
      };
      
      const url = activeTab === 'login' ? '/api/auth/login' : '/api/auth/register';
      
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Something went wrong.');
        }
        
        if (activeTab === 'login') {
          // Store token in local storage
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.role);
          localStorage.setItem('username', data.username);
          
          alertContainer.innerHTML = `
            <div class="alert alert-success">
              Access granted. Redirecting to your dashboard...
            </div>
          `;
          
          setTimeout(() => {
            if (data.role === 'admin') {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/client.html';
            }
          }, 1000);
          
        } else {
          alertContainer.innerHTML = `
            <div class="alert alert-success">
              Registration successful! Please login below.
            </div>
          `;
          switchTab('login');
          passwordInput.value = '';
        }
      } catch (err) {
        alertContainer.innerHTML = `
          <div class="alert alert-danger">
            ${err.message}
          </div>
        `;
      }
    }
  </script>

</body>
</html>
